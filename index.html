<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Optimization Dev Dashboard (Pro)</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:#0b1220;color:#e5e7eb;padding:20px}
    h1{font-size:1.8rem;margin-bottom:16px}
    .grid{display:grid;grid-template-columns:1fr 2fr;gap:16px}
    .card{background:#111827;border-radius:16px;padding:16px;box-shadow:0 10px 25px rgba(0,0,0,.35)}
    .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    select,button{padding:10px;border-radius:10px;border:none}
    select{background:#1f2937;color:#e5e7eb}
    button{background:#22c55e;color:#04130b;font-weight:600;cursor:pointer}
    button.secondary{background:#374151;color:#e5e7eb}
    #result{margin-top:10px;line-height:1.5}
    canvas{margin-top:10px}

    /* Loader */
    .loader{display:none;margin-top:10px}
    .bar{height:6px;background:#1f2937;border-radius:999px;overflow:hidden}
    .bar span{display:block;height:100%;width:0%;background:#22c55e;animation:load 1.2s linear infinite}
    @keyframes load{0%{width:0%}50%{width:70%}100%{width:100%}}

    /* FPS meter */
    .fps{font-size:.9rem;opacity:.9;margin-top:6px}
  </style>
</head>
<body>
  <h1>🚀 Optimization Developer Dashboard</h1>

  <div class="grid">
    <div class="card">
      <div class="row">
        <label>Test Size:</label>
        <select id="size">
          <option value="5000">Small</option>
          <option value="12000" selected>Medium</option>
          <option value="20000">Large</option>
        </select>
      </div>
      <div class="row" style="margin-top:10px">
        <button onclick="runOnce()">Run Once</button>
        <button onclick="toggleAuto()" id="autoBtn">Start Auto</button>
        <button class="secondary" onclick="exportCSV()">Export CSV</button>
        <button class="secondary" onclick="resetChart()">Reset</button>
      </div>

      <div class="loader" id="loader">
        <div class="bar"><span></span></div>
      </div>

      <div id="result"></div>
      <div class="fps" id="fps">FPS: --</div>
    </div>

    <div class="card">
      <h3>Live Performance (ms)</h3>
      <canvas id="chart"></canvas>
    </div>
  </div>

<script>
function slowFunction(n){let c=0;for(let i=0;i<n;i++){for(let j=0;j<n;j++){c++;}}return c}
function fastFunction(n){let c=0;for(let i=0;i<n;i++){c++;}return c}

let chart = new Chart(document.getElementById('chart'),{
  type:'line',
  data:{labels:[],datasets:[{label:'Slow (ms)',data:[],tension:.3},{label:'Fast (ms)',data:[],tension:.3}]},
  options:{responsive:true,animation:true,scales:{y:{beginAtZero:true}}}
});

let runCount=0;
let auto=false;
let autoTimer=null;
let results=[]; // for export

function measure(n){
  const s1=performance.now(); slowFunction(n); const e1=performance.now();
  const s2=performance.now(); fastFunction(n); const e2=performance.now();
  return {slow:(e1-s1), fast:(e2-s2)};
}

function updateUI(slow, fast){
  const improve = Math.max(1, Math.round(slow/fast));
  document.getElementById('result').innerHTML =
    `⏱ BEFORE: ${slow.toFixed(2)} ms<br>⚡ AFTER: ${fast.toFixed(2)} ms<br>🚀 Improvement: ~${improve}x faster`;
}

function pushChart(slow, fast){
  runCount++;
  chart.data.labels.push('Run '+runCount);
  chart.data.datasets[0].data.push(+slow.toFixed(2));
  chart.data.datasets[1].data.push(+fast.toFixed(2));
  chart.update();
}

function runOnce(){
  const n = parseInt(document.getElementById('size').value);
  const loader = document.getElementById('loader');
  loader.style.display='block';

  requestAnimationFrame(()=>{
    const {slow, fast} = measure(n);
    loader.style.display='none';
    updateUI(slow, fast);
    pushChart(slow, fast);
    results.push({run:runCount, size:n, slow:slow.toFixed(2), fast:fast.toFixed(2)});
  });
}

function toggleAuto(){
  auto = !auto;
  const btn = document.getElementById('autoBtn');
  btn.textContent = auto ? 'Stop Auto' : 'Start Auto';
  if(auto){
    autoTimer = setInterval(runOnce, 1200);
  } else {
    clearInterval(autoTimer);
  }
}

function resetChart(){
  runCount=0; results=[];
  chart.data.labels=[];
  chart.data.datasets.forEach(d=>d.data=[]);
  chart.update();
  document.getElementById('result').innerHTML='';
}

function exportCSV(){
  if(results.length===0) return alert('No data to export');
  let csv = 'Run,Size,Slow(ms),Fast(ms)\n';
  results.forEach(r=>{csv += `${r.run},${r.size},${r.slow},${r.fast}\n`;});
  const blob = new Blob([csv], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'benchmark_results.csv';
  a.click();
  URL.revokeObjectURL(url);
}

// FPS meter
let last = performance.now(), frames = 0;
function fpsLoop(){
  const now = performance.now(); frames++;
  if(now - last >= 1000){
    document.getElementById('fps').textContent = 'FPS: ' + frames;
    frames = 0; last = now;
  }
  requestAnimationFrame(fpsLoop);
}
fpsLoop();
</script>
</body>
</html>
